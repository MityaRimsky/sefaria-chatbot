<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, height=device-height">
    <title>SHUVA</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link rel="apple-touch-icon" href="/static/images/logo-apple-touch.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@200;300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/auth.js"></script>
    <style>
        :root {
            --primary-color: #007FE7;
            --sidebar-bg: #fbfcff;
            --sidebar-hover: #f3f6ff;
            --text-color: #333;
            --text-light: #727272;
            --bg-color: #fff;
            --message-user-bg: #f0faff;
            --message-bot-bg: #f5f5f5;
            --border-color: #e0e0e0;
            --border-radius: 32px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Golos Text', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
        }
        
        /* Боковая панель (только для десктопа) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
        }
        
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-color);
            letter-spacing: 0.055em;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Roboto', sans-serif;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(0, 127, 231, 0);
            border: 1px solid rgba(0, 127, 231, 0.1);
            color: var(--primary-color);
            padding: 10px 15px;
            border-radius: var(--border-radius);
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }
        
        .new-chat-btn:hover {
            background-color: rgba(0, 127, 231, 0.1);
        }
        
        .chat-history {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.2s;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .chat-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            padding-right: 10px; /* Добавляем отступ справа */
        }
        
        .chat-item:hover {
            background-color: var(--sidebar-hover);
        }
        
        .chat-item.active {
            background-color: var(--sidebar-hover);
            color: var(--text-light);
        }
        
        /* Мобильная навигация */
        .mobile-nav {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background-color: var(--sidebar-bg);
            z-index: 100;
            transition: none; /* Отключаем анимацию для мгновенного перемещения */
        }
        
        .mobile-nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .mobile-logo {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: 0.055em;
        }
        
        .mobile-actions {
            display: flex;
            gap: 15px;
        }
        
        .mobile-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--sidebar-hover);
            color: var(--text-color);
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .mobile-btn:hover {
            background-color: rgba(0, 127, 231, 0.1);
        }
        
        /* Мобильное меню истории */
        .mobile-history {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 80%;
            max-width: 300px;
            background-color: var(--sidebar-bg);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            color: var(--text-color);
            overflow-y: hidden;
        }
        
        /* Стили для списка чатов в мобильном меню */
        #mobile-history-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .mobile-history.active {
            transform: translateX(0);
        }
        
        .mobile-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .mobile-history-close {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: auto;
        }
        
        /* Основной контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
            background-color: #fff;
            overflow-y: auto;
            scrollbar-width: none;
            z-index: 1;
        }
        
        /* Область сообщений */
        .chat-container {
            flex: 1;
            padding-top: 64px;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding-bottom: 168px;
        }
        
        /* Добавляем плавную прокрутку для основного контента */
        .main-content {
            scroll-behavior: smooth;
        }
        
        /* Приветственное сообщение */
        .welcome-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            padding: 20px;
            color: var(--text-light);
        }
        
        .welcome-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .welcome-message h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        /* Стили для сообщений в виде пузырей */
        .message-row {
            display: flex;
            margin-bottom: 16px;
            position: relative;
            padding: 0 16px;
        }
        
        .message-row.user {
            justify-content: flex-end;
        }
        
        .message-row.bot {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            position: relative;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        
        .user .message-bubble {
            background-color: var(--sidebar-hover);
            color: var(--text-color);
            border-bottom-right-radius: 4px;
        }
        
        .bot .message-bubble {
            background-color: transparent;
            color: var(--text-color);
            border-bottom-left-radius: 0;
            box-shadow: none;
            padding-left: 0;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .user .message-avatar {
            display: none;
        }
        
        .bot .message-avatar {
            background-color: transparent;
        }
        
        /* Лоадер для ожидания ответа бота */
        .typing-indicator {
            display: none;
            margin-bottom: 16px;
            position: relative;
        }
        
        .typing-indicator .message-bubble {
            display: flex;
            align-items: center;
            min-width: 60px;
        }
        
        .typing-dots {
            display: flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.3s ease-out;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #aaa;
            border-radius: 50%;
            animation: typingAnimation 1.5s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.3s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.6s;
        }
        
        @keyframes typingAnimation {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
        
        /* Анимации для плавного перехода от индикатора к тексту */
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .typing-fade-out {
            animation: fadeOut 0.3s forwards;
        }
        
        .typing-content-fade-in {
            opacity: 0;
            animation: fadeIn 0.3s 0.2s forwards;
        }
        
        /* Стили для цитат из Sefaria */
        .sefaria-quote {
            background-color: #fff8e1;
            border-left: 3px solid var(--primary-color);
            padding: 10px 12px;
            margin: 10px 0;
            font-style: italic;
            border-radius: 12px;
        }
        
        .sefaria-ref {
            font-weight: 500;
            color: #5d4037;
        }
        
        /* Стили для Markdown */
        .message-bubble h1, .message-bubble h2, .message-bubble h3, 
        .message-bubble h4, .message-bubble h5, .message-bubble h6 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
            line-height: 1.25;
        }
        
        .message-bubble h1 {
            font-size: 1.5em;
        }
        
        .message-bubble h2 {
            font-size: 1.3em;
        }
        
        .message-bubble h3 {
            font-size: 1.1em;
        }
        
        .message-bubble p {
            margin-bottom: 10px;
        }
        
        .message-bubble ul, .message-bubble ol {
            margin-top: 0;
            margin-bottom: 10px;
            padding-left: 20px;
        }
        
        .message-bubble blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin: 0 0 10px 0;
        }
        
        .message-bubble pre {
            background-color: #f6f8fa;
            border-radius: 3px;
            padding: 16px;
            overflow: auto;
            margin-bottom: 10px;
        }
        
        .message-bubble code {
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
            padding: 0.2em 0.4em;
            font-family: monospace;
        }
        
        /* Модуль ввода */
        .input-container {
            width: 100%;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
        }

        @media (min-width: 769px) {
        .input-container {
            left: 260px; /* ширина .sidebar */
            width: calc(100% - 260px);
        }
        }
        

        .input-wrapper {
            max-width: 800px;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #message-input {
            flex: 1;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            line-height: 1.5; /* Это обеспечит правильное выравнивание текста */
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 16px;
            color: var(--text-color);
            outline: none;
            resize: none;
            min-height: 56px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            transition: border 0.2s, box-shadow 0.2s;
            font-family: 'Golos Text', sans-serif;
        }
        
        #message-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 122, 255, 0.1);
        }
        
        #send-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            width: 56px;
            height: 56px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.2s;
            flex-shrink: 0;
        }
        
        #send-button:hover {
            background-color: rgba(0, 127, 231, 0.8);
        }
        
        #send-button:active {
            transform: scale(0.95);
        }
        
        .input-info {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 10px;
            text-align: center;
        }
        
        /* Сообщение об ошибке */
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px 16px;
            border-radius: var(--border-radius);
            margin: 10px 20px;
            font-size: 0.9rem;
            display: none;
            max-width: 800px;
            margin: 10px auto;
        }
        
        /* Адаптивный дизайн */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .mobile-nav {
                display: block;
            }
            
            .main-content {
                padding-top: 70px; /* Учитываем высоту мобильной навигации */
            }
            
            .input-container {
                padding: 15px;
                padding-bottom: calc(15px + env(safe-area-inset-bottom, 20px)); /* Увеличиваем отступ для мобильных устройств */
            }
            
            .message-bubble {
                max-width: 85%;
            }
        }
        
        /* Затемнение фона при открытом мобильном меню */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 150;
            display: none;
        }
        
        .overlay.active {
            display: block;
        }
        
        /* Стили для блока пользователя */
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
            z-index: 1000;
        }
        
        .sidebar-user:hover {
            background-color: var(--sidebar-hover);
        }
        
        .sidebar-user .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .sidebar-user .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .sidebar-user .user-info {
            flex: 1;
            overflow: hidden;
        }
        
        .sidebar-user .user-info {
            display: flex;
            align-items: center;
            gap: 0;
        }
        
        .sidebar-user .user-info span {
            display: block;
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
            font-size: 0.9rem;
            max-width: 160px; /* Ограничиваем ширину для длинных email */
            flex-grow: 1; /* Растягиваем текст на всё свободное пространство */
            margin-right: 10px; /* Фиксированный отступ между текстом и иконкой */
        }
        
        .sidebar-user .user-info i {
            color: var(--text-light);
            font-size: 1rem;
            margin-left: auto; /* Прижимаем иконку к правому краю */
        }
        
        /* Стили для мобильного блока пользователя */
        .mobile-sidebar-user {
            margin-top: auto;
        }
        
        /* Стили для секции профиля */
        .profile-section {
            width: 100%;
            margin-bottom: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        
        .profile-section h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        
        /* Стили для переключателя языка */
        .language-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 0.4rem;
        }
        
        .language-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        
        .language-option.active {
            border-color: var(--primary-color);
        }
        
        .language-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Стили для круглых иконок языков */
        .lang-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--sidebar-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1.2;
            font-weight: 500;
            text-transform: lowercase;
            color: var(--text-color);
        }
        
        .language-option.active .lang-circle {
            border-color: var(--primary-color);
            border-width: 1px;
        }

        @media (hover: none) {
        .mobile-btn:hover,
        .send-button:hover,
        .chat-item:hover,
        .sidebar-user:hover,
        .new-chat-btn:hover {
            background-color: transparent !important;
        }
        }

        /* Убирает голубую подсветку на iOS */
        .mobile-btn,
        .send-button,
        .chat-item,
        .sidebar-user,
        .new-chat-btn {
        -webkit-tap-highlight-color: transparent;
        }

        /* Опционально: добавляет анимацию для :active */
        .mobile-btn:active,
        .send-button:active,
        .chat-item:active,
        .sidebar-user:active,
        .new-chat-btn:active {
        background-color: rgba(0, 127, 231, 0.1) !important;
        transition: background-color 0.1s;
        }
        
        /* Стили для элементов профиля */
        .profile-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        
        .profile-item:last-child {
            border-bottom: none;
        }
        
        
        .profile-item-left {
            font-size: 0.9rem;
            color: var(--text-color);
            line-height: 1.2;
            font-weight: 200;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .profile-item-left i {
            opacity: 0.75;
            width: 24px;
            height: 24px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }
        
        .profile-item-right {
            display: flex;
            align-items: center;
            margin-left: auto;
        }
        
        .profile-item-right i {
            color: var(--text-light);
            font-size: 0.9rem;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Исправление для SVG-изображений в темной теме */
        .logo-image, 
        .language-option img, 
        .welcome-icon img, 
        .message-avatar img,
        .user-avatar img {
            color-scheme: light;
            forced-color-adjust: none;
            filter: none !important;
        }
        
        /* Стили для иконок действий с сообщениями */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            margin-bottom: 16px;
        }
        
        .message-actions.left-aligned {
            justify-content: flex-start;
            padding-left: 40px; /* Отступ для выравнивания с сообщением бота */
        }
        
        .message-actions.right-aligned {
            justify-content: flex-end;
            padding-right: 16px; /* Отступ для выравнивания с сообщением пользователя */
        }
        
        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--sidebar-hover);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-light);
            transition: background-color 0.2s, color 0.2s;
        }
        
        .action-icon:hover {
            background-color: rgba(0, 127, 231, 0.1);
            color: var(--primary-color);
        }
        
        .copy-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 10000;
        }
        
        /* Стили для скелетон-анимации при загрузке переводов */
        @keyframes skeleton-loading {
            0% {
                background-color: rgba(200, 200, 200, 0.1);
            }
            50% {

            // Функция для прокрутки чата вниз

            // Функция для проверки наличия сообщений и управления приветственным сообщением
            function checkMessagesAndToggleWelcome() {

                        chatContainer.innerHTML = welcomeHTML + chatContainer.innerHTML;
                    }
                }
            }
            
            // Переменные для отслеживания состояния печатания
            let isTyping = false;

            // Функция для постепенного печатания текста с реалистичными задержками
            function typeMessage(element, message, baseSpeed = 10) {
                return new Promise((resolve) => {
                    let i = 0;
                    let lastTimestamp = 0;
                    let accumulatedTime = 0;
                    let currentDelay = 0;
                    
                    isTyping = true;
                    typingCancelled = false;
                    
                    // Функция для определения задержки для текущего символа
                    function getDelay(char, prevChar) {
                        // Базовая задержка
                        let delay = baseSpeed + Math.random() * 10;
                        
                        // Увеличиваем задержку после знаков препинания
                        const punctuation = ['.', ',', '!', '?', ':', ';'];
                        if (punctuation.includes(prevChar)) {
                            delay += 100 + Math.random() * 50;
                        }
                        
                        // Дополнительная задержка в конце предложения
                        if (prevChar === '.' && (char === ' ' || char === '\n')) {
                            delay += 200 + Math.random() * 100;
                        }
                        
                        // Небольшая задержка между словами
                        if (prevChar === ' ') {
                            delay += 20 + Math.random() * 20;
                        }
                        
                        return delay;
                    }
                    
                    // Используем requestAnimationFrame для более плавной анимации
                    function animate(timestamp) {
                        if (typingCancelled) {
                            isTyping = false;
                            resolve();
                            return;
                        }
                        
                        if (!lastTimestamp) lastTimestamp = timestamp;
                        const elapsed = timestamp - lastTimestamp;
                        
                        accumulatedTime += elapsed;
                        
                        // Если прошло достаточно времени, добавляем следующий символ
                        if (accumulatedTime >= currentDelay) {
                            if (i <= message.length) {
                                // Добавляем по одному символу
                                element.innerHTML = message.substring(0, i);
                                
                                // Прокручиваем чат вниз при добавлении текста
                                scrollChatToBottom();
                                
                                // Если текст полностью напечатан, останавливаем анимацию
                                if (i === message.length) {
                                    isTyping = false;
                                    resolve();
                                    return;
                                }
                                
                                // Вычисляем задержку для следующего символа
                                const char = message[i];
                                const prevChar = i > 0 ? message[i-1] : '';
                                currentDelay = getDelay(char, prevChar);
                                
                                // Сбрасываем накопленное время
                                accumulatedTime = 0;
                                i++;
                            }
                        }
                        
                        lastTimestamp = timestamp;
                        typingTimerId = requestAnimationFrame(animate);
                    }
                    
                    // Запускаем анимацию
                    typingTimerId = requestAnimationFrame(animate);
                });
            }
            
            // Функция для трансформации индикатора загрузки в сообщение бота
            function transformTypingIndicatorToMessage(message) {
                return new Promise(async (resolve) => {

                    const typingIndicator = document.getElementById('typing-indicator-inline');

                        resolve(false);
                        return;
                    }
                    
                    // Сбрасываем флаг отмены печатания
                    typingCancelled = false;
                    
                    // Находим контейнер с точками
                    const typingDots = typingIndicator.querySelector('.typing-dots');
                    const messageBubble = typingIndicator.querySelector('.message-bubble');
                    
                    // Добавляем класс для анимации исчезновения точек
                    typingDots.classList.add('typing-fade-out');
                    
                    // Создаем контейнер для текста сообщения
                    const messageContent = document.createElement('div');
                    messageContent.classList.add('typing-content-fade-in');
                    
                    // Добавляем контейнер для текста в пузырь сообщения
                    messageBubble.appendChild(messageContent);
                    
                    // Ждем завершения анимации исчезновения точек
                    setTimeout(() => {
                        // Проверяем, не была ли отменена трансформация
                        if (typingCancelled) {
                            // Очищаем таймер печатания, если он активен
                            if (typingTimerId) {
                                if (typeof typingTimerId === 'number') {
                                    cancelAnimationFrame(typingTimerId);
                                } else {
                                    clearInterval(typingTimerId);
                                }
                                typingTimerId = null;
                            }
                            resolve(false);
                            return;
                        }
                        
                        // Удаляем точки
                        typingDots.remove();
                        
                        // Преобразуем Markdown в HTML
                        let formattedMessage = message;
                        
                        // Заменяем ссылки на тексты Sefaria специальным форматированием
                        formattedMessage = formattedMessage.replace(/📜\s+([^:]+)(?:\s+-\s+([^\n]+))?/g, '<div class="sefaria-quote"><span class="sefaria-ref">📜 $1</span>$2</div>');
                        
                        try {
                            // Используем marked.js для преобразования Markdown в HTML
                            formattedMessage = marked.parse(formattedMessage);
                        } catch (e) {
                            console.error('Ошибка при обработке Markdown:', e);
                        }
                        
                        // Печатаем сообщение с эффектом
                        typeMessage(messageContent, formattedMessage, 5).then(() => {
                                // Если печатание не было отменено, превращаем индикатор в обычное сообщение
                                if (!typingCancelled) {
                                    // Удаляем ID индикатора, чтобы превратить его в обычное сообщение
                                    typingIndicator.removeAttribute('id');
                                    typingIndicator.classList.remove('typing-indicator');
                                    
                                    // Добавляем иконки действий
                                    addActionIcons();
                                    
                                    // Сообщаем, что трансформация завершена
                                    resolve(true);
                                } else {
                                    resolve(false);
                                }
                        });
                    }, 300); // Время анимации исчезновения точек
                });
            }
            const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            if (isiOS && window.visualViewport) {
            const inputContainer = document.querySelector('.input-container');
            const mainContent = document.querySelector('.main-content');
            const messageInput = document.getElementById('message-input');

            function updateOnKeyboardChange() {
                const keyboardHeight = window.innerHeight - window.visualViewport.height;

                if (keyboardHeight > 150) {
                inputContainer.style.position = 'absolute';
                inputContainer.style.bottom = `${keyboardHeight}px`;
                mainContent.style.overflow = 'hidden';
                mainContent.scrollTop = mainContent.scrollHeight;
                } else {
                inputContainer.style.position = 'fixed';
                inputContainer.style.bottom = '0';
                mainContent.style.overflowY = 'auto';
                }
            }

            function deferUpdateAfterVisibilityChange() {
                requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    updateOnKeyboardChange();
                });
                });
            }

            messageInput.addEventListener('focus', () => {
                setTimeout(() => {
                updateOnKeyboardChange();
                mainContent.scrollTop = mainContent.scrollHeight;
                }, 50);
            });

            messageInput.addEventListener('blur', () => {
                inputContainer.style.position = 'fixed';
                inputContainer.style.bottom = '0';
                mainContent.style.overflowY = 'auto';
            });

            window.visualViewport.addEventListener('resize', updateOnKeyboardChange);
            window.visualViewport.addEventListener('scroll', updateOnKeyboardChange);

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                deferUpdateAfterVisibilityChange();
                }
            });

            window.addEventListener('pageshow', () => {
                deferUpdateAfterVisibilityChange();
            });

            // 💡 Теперь работает всегда, даже без возврата из фона
            window.fixKeyboardAfterChatChange = () => {
                const messageInput = document.getElementById('message-input');

                setTimeout(() => {

            // Функция для получения последнего элемента сообщения в чате
            function getLastMessageElement() {

            }
            
            // Функция для получения последнего сообщения пользователя из Supabase
            async function getLastUserMessage() {
                if (!currentSessionId) return null;
                
                try {
                    // Получаем все сообщения текущей сессии
                    const messages = await window.chatService.getChatMessages(currentSessionId);
                    
                    // Фильтруем сообщения пользователя и берем последнее
                    const userMessages = messages.filter(msg => msg.sender === 'user');
                    return userMessages.length > 0 ? userMessages[userMessages.length - 1] : null;
                } catch (error) {

                    return null;
                }
            }

                const messageBubble = lastMessage.querySelector('.message-bubble');

                // Копируем в буфер обмена

                const notification = document.createElement('div');
                notification.className = 'copy-notification';
                notification.textContent = window.i18nModule.t('copy.notification', 'Скопировано в буфер обмена');
                document.body.appendChild(notification);
                
                // Удаляем уведомление через 2 секунды
                setTimeout(() => {
                    notification.remove();
                }, 2000);
            }
            
            // Функция для повторной генерации ответа
            async function regenerateResponse(messageType) {
                try {
                    // Получаем последнее сообщение пользователя
                    const lastUserMessage = await getLastUserMessage();
                    
                    if (!lastUserMessage) {
                        console.error('Не найдено сообщений пользователя');
                        return;
                    }
                    
        // Не удаляем последнее сообщение бота, чтобы сохранить историю
        
                    // Удаляем иконки действий
                    const actionsContainer = document.querySelector('.message-actions');
                    if (actionsContainer) {
                        actionsContainer.remove();
                    }
                    
                    // Если кнопка была нажата под сообщением бота, сначала добавляем последнее сообщение пользователя
                    if (messageType === 'bot') {
                        // Добавляем последнее сообщение пользователя в чат и сохраняем в БД
                        addMessage(lastUserMessage.content, true);
                    }
                    
                    // Отправляем запрос на сервер
                    toggleLoadingState(true);
                    errorMessage.style.display = 'none';
                    
                    // Создаем новый AbortController
                    controller = new AbortController();
                    
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ query: lastUserMessage.content }),
                        signal: controller.signal
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // Добавляем ответ бота в чат с эффектом печатания и трансформацией индикатора
                        await addMessageToUI(data.response, false, true, true);
                        
                        // Сохраняем сообщение в БД
                        if (currentSessionId) {
                            try {
                                await window.chatService.addChatMessage(
                                    currentSessionId, 
                                    data.response, 
                                    false
                                );
                            } catch (error) {
                                console.error('Ошибка при сохранении сообщения бота:', error);
                            }
                        }
                        
                        // Обновляем список чатов (название может измениться)
                        const sessions = await window.chatService.getChatSessions();
                        updateChatList(sessions);
                        
                        // Дополнительная прокрутка вниз после добавления ответа бота
                        scrollChatToBottom();
                    } else {
                        // Показываем сообщение об ошибке
                        errorMessage.textContent = data.error || 'Произошла ошибка при обработке запроса';
                        errorMessage.style.display = 'block';
                    }
                } catch (error) {
                    // Проверяем, была ли операция прервана намеренно
                    if (error.name !== 'AbortError') {
                        // Показываем сообщение об ошибке
                        errorMessage.textContent = 'Не удалось подключиться к серверу';
                        errorMessage.style.display = 'block';
                    }
                } finally {
                    // Сбрасываем контроллер и индикатор загрузки
                    controller = null;
                    toggleLoadingState(false);
                }
            }
            
            // Функция для добавления иконок действий к последнему сообщению
            function addActionIcons() {
                // Удаляем существующие иконки действий, если они есть
                const existingIcons = document.querySelector('.message-actions');
                if (existingIcons) {
                    existingIcons.remove();
                }
                
                const lastMessage = getLastMessageElement();
                if (!lastMessage) return;
                
                const isUser = lastMessage.classList.contains('user');
                
                // Создаем контейнер для иконок
                const actionsContainer = document.createElement('div');
                actionsContainer.className = 'message-actions';
                
                // Позиционируем контейнер в зависимости от типа сообщения
                if (isUser) {
                    actionsContainer.classList.add('right-aligned');
                } else {
                    actionsContainer.classList.add('left-aligned');
                }
                
                // Добавляем иконки
                actionsContainer.innerHTML = `
                    <button class="action-icon copy-icon" title="${window.i18nModule.t('copy.button', 'Копировать сообщение')}">
                        <i class="fas fa-clone"></i>
                    </button>
                    <button class="action-icon regenerate-icon" data-message-type="${isUser ? 'user' : 'bot'}" title="${window.i18nModule.t('regenerate.button', 'Сгенерировать ответ заново')}">
                        <i class="fas fa-sync"></i>
                    </button>
                `;
                
                // Добавляем контейнер после последнего сообщения
                lastMessage.insertAdjacentElement('afterend', actionsContainer);
                
                // Добавляем обработчики событий
                actionsContainer.querySelector('.copy-icon').addEventListener('click', copyLastMessage);
                actionsContainer.querySelector('.regenerate-icon').addEventListener('click', function() {
                    regenerateResponse(this.getAttribute('data-message-type'));
                });
            }
            
            // Функция для добавления сообщения в UI (без сохранения в БД)
            async function addMessageToUI(message, isUser, useTypingEffect = false, transformIndicator = false) {
                // Удаляем приветственное сообщение при добавлении первого сообщения
                const welcomeMessage = document.getElementById('welcome-message');
                if (welcomeMessage) {
                    welcomeMessage.remove();
                }
                
                // Если это сообщение бота и нужно трансформировать индикатор
                if (!isUser && transformIndicator) {
                    // Пробуем трансформировать существующий индикатор загрузки
                    const transformed = await transformTypingIndicatorToMessage(message);
                    
                    // Если трансформация прошла успешно, не создаем новый элемент
                    if (transformed) {
                        // Прокрутка вниз после добавления сообщения
                        scrollChatToBottom();
                        return;
                    }
                }
                
                // Если трансформация не удалась или не требуется, создаем новый элемент
                const messageRow = document.createElement('div');
                messageRow.classList.add('message-row');
                messageRow.classList.add(isUser ? 'user' : 'bot');
                
                let html = '';
                
                if (!isUser) {
                    html += '<div class="message-avatar"><img src="/static/images/logo.svg" alt="Sefaria Logo" style="width: 100%; height: 100%; border-radius: 50%;"></div>';
                }
                
                const messageBubble = document.createElement('div');
                messageBubble.classList.add('message-bubble');
                
                // Добавляем аватар и пустой пузырь сообщения
                messageRow.innerHTML = html;
                messageRow.appendChild(messageBubble);
                chatContainer.appendChild(messageRow);
                
                // Прокрутка вниз
                scrollChatToBottom();
                
                // Обработка форматирования и печатание для сообщений бота
                if (!isUser) {
                    // Заменяем ссылки на тексты Sefaria специальным форматированием
                    message = message.replace(/📜\s+([^:]+)(?:\s+-\s+([^\n]+))?/g, '<div class="sefaria-quote"><span class="sefaria-ref">📜 $1</span>$2</div>');
                    
                    // Преобразуем Markdown в HTML
                    try {
                        // Используем marked.js для преобразования Markdown в HTML
                        message = marked.parse(message);
                        
                        // Постепенно печатаем сообщение только для новых сообщений
                        if (useTypingEffect) {
                            await typeMessage(messageBubble, message, 5);
                        } else {
                            messageBubble.innerHTML = message;
                        }
                    } catch (e) {
                        console.error('Ошибка при обработке Markdown:', e);
                        messageBubble.innerHTML = message;
                    }
                } else {
                    // Для сообщений пользователя просто добавляем текст
                    messageBubble.innerHTML = message;
                }
                
                // Прокрутка вниз после добавления сообщения
                scrollChatToBottom();
                
                // Добавляем иконки действий к последнему сообщению
                addActionIcons();
            }
            
            // Функция для добавления сообщения в чат и сохранения в БД
            async function addMessage(message, isUser) {
                // Добавляем сообщение в UI
                addMessageToUI(message, isUser);
                
                // Сохраняем сообщение в Supabase
                if (currentSessionId) {
                    try {
                        await window.chatService.addChatMessage(
                            currentSessionId, 
                            message, 
                            isUser
                        );
                        
                        // Если это первое сообщение пользователя, обновляем заголовок сессии
                        if (isUser) {
                            const sessions = await window.chatService.getChatSessions();
                            updateChatList(sessions);
                        }
                    } catch (error) {
                        console.error('Ошибка при сохранении сообщения:', error);
                        // Не показываем ошибку пользователю, чтобы не прерывать взаимодействие
                    }
                }
            }
            
            // Функция для загрузки истории чатов
            async function loadHistory() {
                try {
                    // Проверяем, авторизован ли пользователь
                    const { data: authData } = await window.supabaseClient.auth.getUser();
                    
                    if (!authData || !authData.user) {
                        // Если пользователь не авторизован, показываем приветственное сообщение
                        checkMessagesAndToggleWelcome();
                        return;
                    }
                    
                    // Получаем список сессий чата
                    const sessions = await window.chatService.getChatSessions();
                    
                    if (sessions.length > 0) {
                        // Загружаем последнюю активную сессию
                        currentSessionId = sessions[0].id;
                        await loadChat(currentSessionId);
                        
                        // Обновляем список чатов
                        updateChatList(sessions);
                    } else {
                        // Если нет сохраненных сессий, создаем новую
                        const newSession = await window.chatService.createChatSession();
                        if (newSession) {
                            currentSessionId = newSession.id;
                            updateChatList([newSession]);
                        }
                    }
                    
                    // Проверяем, нужно ли показать приветственное сообщение
                    checkMessagesAndToggleWelcome();
                } catch (error) {
                    console.error('Ошибка при загрузке истории:', error);
                    
                    // Если ошибка связана с авторизацией, не показываем ее пользователю
                    if (error.message && error.message.includes('авторизован')) {
                        checkMessagesAndToggleWelcome();
                    } else {
                        showError('Не удалось загрузить историю чатов');
                    }
                }
            }
            
            // Функция для загрузки конкретного чата
            async function loadChat(sessionId) {
            try {
                // Очищаем контейнер чата
                chatContainer.innerHTML = '';

                // Загружаем сообщения выбранного чата
                const messages = await window.chatService.getChatMessages(sessionId);

                // Добавляем сообщения в чат
                messages.forEach(message => {
                const isUser = message.sender === 'user';
                addMessageToUI(message.content, isUser);
                });

                // Обновляем текущий ID сессии
                currentSessionId = sessionId;

                // Обновляем активный элемент в списке чатов
                document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.sessionId === sessionId) {
                    item.classList.add('active');
                }
                });

                // Закрываем мобильное меню истории
                closeMobileHistory();

                // Проверяем, нужно ли показать приветственное сообщение
                checkMessagesAndToggleWelcome();

                // Прокручиваем чат вниз после загрузки
                scrollChatToBottom();

                // ✅ Фикс для iOS: если до этого был возврат из фона — пересчитать layout
                if (typeof window.fixKeyboardAfterChatChange === 'function') {
                window.fixKeyboardAfterChatChange();
                }

            } catch (error) {
                console.error('Ошибка при загрузке чата:', error);
                showError('Не удалось загрузить сообщения чата');
            }
            }
            
            // Функция для обновления списка чатов
            function updateChatList(sessions) {
                const desktopHistory = document.getElementById('desktop-history');
                const mobileHistoryList = document.getElementById('mobile-history-list');
                
                // Очищаем списки
                desktopHistory.innerHTML = '';
                mobileHistoryList.innerHTML = '';
                
                // Добавляем чаты в списки
                sessions.forEach((session, index) => {
                    // Создаем элемент для десктопного списка
                    const desktopItem = document.createElement('div');
                    desktopItem.classList.add('chat-item');
                    desktopItem.dataset.sessionId = session.id;
                    if (session.id === currentSessionId) desktopItem.classList.add('active');
                    
                    // Используем title или создаем название по умолчанию с переводом
                    const chatName = session.title || window.i18nModule.t('chat.default', { number: index + 1 });
                    
                    desktopItem.innerHTML = `
                        <i class="fas fa-comment"></i>
                        <span>${chatName}</span>
                    `;
                    desktopItem.addEventListener('click', () => loadChat(session.id));
                    desktopHistory.appendChild(desktopItem);
                    
                    // Создаем элемент для мобильного списка
                    const mobileItem = document.createElement('div');
                    mobileItem.classList.add('chat-item');
                    mobileItem.dataset.sessionId = session.id;
                    if (session.id === currentSessionId) mobileItem.classList.add('active');
                    mobileItem.innerHTML = `
                        <i class="fas fa-comment"></i>
                        <span>${chatName}</span>
                    `;
                    mobileItem.addEventListener('click', () => loadChat(session.id));
                    mobileHistoryList.appendChild(mobileItem);
                });
            }
            
            // Функция для создания нового чата
            async function createNewChat() {
                try {
                    // Проверяем, авторизован ли пользователь
                    const { data: authData } = await window.supabaseClient.auth.getUser();
                    
                    if (!authData || !authData.user) {
                        // Если пользователь не авторизован, перенаправляем на страницу авторизации
                        window.location.href = '/auth';
                        return;
                    }
                    
                    // Проверяем, является ли текущий чат пустым
                    if (currentSessionId) {
                        const currentMessages = await window.chatService.getChatMessages(currentSessionId);
                        if (currentMessages.length === 0) {
                            // Если текущий чат пустой, ничего не делаем - пользователь уже в новом чате
                            return;
                        }
                    }
                    
                    // Проверяем наличие пустых чатов среди других сессий
                    const sessions = await window.chatService.getChatSessions();
                    
                    // Исключаем текущую сессию из поиска
                    const otherSessions = sessions.filter(session => session.id !== currentSessionId);
                    
                    // Ищем пустой чат среди других сессий
                    for (const session of otherSessions) {
                        const messages = await window.chatService.getChatMessages(session.id);
                        if (messages.length === 0) {
                            // Если найден пустой чат, переходим к нему
                            loadChat(session.id);
                            return;
                        }
                    }
                    
                    // Если нет других пустых чатов, создаем новый
                    const newSession = await window.chatService.createChatSession();
                    
                    if (newSession) {
                        // Обновляем текущий ID сессии
                        currentSessionId = newSession.id;
                        
                        // Очищаем контейнер чата
                        chatContainer.innerHTML = '';
                        
                        // Получаем обновленный список сессий
                        const updatedSessions = await window.chatService.getChatSessions();
                        updateChatList(updatedSessions);
                        
                        // Проверяем, нужно ли показывать приветственное сообщение
                        checkMessagesAndToggleWelcome();
                        
                        // Закрываем мобильное меню истории
                        closeMobileHistory();
                    }
                } catch (error) {
                    console.error('Ошибка при создании нового чата:', error);
                    
                    // Если ошибка связана с авторизацией, перенаправляем на страницу авторизации
                    if (error.message && error.message.includes('авторизован')) {
                        window.location.href = '/auth';
                    } else {
                        showError('Не удалось создать новый чат');
                    }
                }
            }
            
            // Функция для отображения ошибки
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                
                // Автоматически скрываем сообщение через 5 секунд
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 5000);
            }
            
            // Функция для переключения состояния кнопки и индикатора набора
            function toggleLoadingState(isLoading) {
                if (isLoading) {
                    sendIcon.style.display = 'none';
                    stopIcon.style.display = 'inline-block';
                    sendButton.style.backgroundColor = 'var(--primary-color)';

                    const typingIndicatorHTML = `

                                    <img src="/static/images/logo.svg" alt="Sefaria Logo" style="width: 100%; height: 100%; border-radius: 50%;">
                                </div>
                                <div class="message-bubble">
                                    <div class="typing-dots">
                                        <div class="typing-dot"></div>
                                        <div class="typing-dot"></div>

                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // Удаляем существующий встроенный индикатор, если он есть

                    const mainContent = document.querySelector('.main-content');
                    mainContent.scrollTop = mainContent.scrollHeight;
                } else {
                    sendIcon.style.display = 'inline-block';
                    stopIcon.style.display = 'none';
                    sendButton.style.backgroundColor = ''; // Возвращаем исходный цвет
                    
                    // Удаляем индикатор загрузки и любой частично напечатанный ответ бота
                    const inlineTypingIndicator = document.getElementById('typing-indicator-inline');
                    if (inlineTypingIndicator) {
                        inlineTypingIndicator.remove();
                    }
                    
                    // Скрываем оригинальный индикатор
                    typingIndicator.style.display = 'none';
                    
                    // Добавляем иконки действий к последнему сообщению

            // Функция для отправки сообщения
            async function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) return;
                
                try {
                    // Проверяем, авторизован ли пользователь
                    const { data: authData } = await window.supabaseClient.auth.getUser();
                    
                    if (!authData || !authData.user) {
                        // Если пользователь не авторизован, перенаправляем на страницу авторизации
                        window.location.href = '/auth';
                        return;
                    }
                    
                    // Проверяем, есть ли активная сессия
                    if (!currentSessionId) {
                        try {
                            // Создаем новую сессию
                            const newSession = await window.chatService.createChatSession(message.substring(0, 50));
                            if (newSession) {
                                currentSessionId = newSession.id;
                                
                                // Обновляем список чатов
                                const sessions = await window.chatService.getChatSessions();
                                updateChatList(sessions);
                            } else {
                                throw new Error('Не удалось создать сессию чата');
                            }
                        } catch (error) {
                            console.error('Ошибка при создании сессии:', error);
                            
                            // Если ошибка связана с авторизацией, перенаправляем на страницу авторизации
                            if (error.message && error.message.includes('авторизован')) {
                                window.location.href = '/auth';
                                return;
                            } else {
                                showError('Не удалось создать сессию чата');
                                return;
                            }
                        }
                    }
                } catch (error) {
                    console.error('Ошибка при проверке авторизации:', error);
                    window.location.href = '/auth';
                    return;
                }
                
                // Добавляем сообщение пользователя в чат
                addMessage(message, true);
                messageInput.value = '';
                messageInput.style.height = 'auto';
                
                // Показываем индикатор загрузки
                toggleLoadingState(true);
                errorMessage.style.display = 'none';
                
                // Создаем новый AbortController
                controller = new AbortController();
                
                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ query: message }),
                        signal: controller.signal
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // Добавляем ответ бота в чат с эффектом печатания и трансформацией индикатора
                        await addMessageToUI(data.response, false, true, true);
                        
                        // Сохраняем сообщение в БД
                        if (currentSessionId) {
                            try {
                                await window.chatService.addChatMessage(
                                    currentSessionId, 
                                    data.response, 
                                    false
                                );
                            } catch (error) {
                                console.error('Ошибка при сохранении сообщения бота:', error);
                            }
                        }
                        
                        // Обновляем список чатов (название может измениться)
                        const sessions = await window.chatService.getChatSessions();
                        updateChatList(sessions);
                        
                        // Дополнительная прокрутка вниз после добавления ответа бота
                        scrollChatToBottom();
                    } else {
                        // Показываем сообщение об ошибке
                        errorMessage.textContent = data.error || 'Произошла ошибка при обработке запроса';
                        errorMessage.style.display = 'block';
                    }
                } catch (error) {
                    // Проверяем, была ли операция прервана намеренно
                    if (error.name !== 'AbortError') {
                        // Показываем сообщение об ошибке
                        errorMessage.textContent = 'Не удалось подключиться к серверу';
                        errorMessage.style.display = 'block';
                    }
                } finally {
                    // Сбрасываем контроллер и индикатор загрузки
                    controller = null;
                    toggleLoadingState(false);
                }
            }
            
            // Функция для открытия мобильного меню истории
            function openMobileHistory() {
                mobileHistoryMenu.classList.add('active');
                overlay.classList.add('active');
            }
            
            // Функция для закрытия мобильного меню истории
            function closeMobileHistory() {
                mobileHistoryMenu.classList.remove('active');
                overlay.classList.remove('active');
            }
            
            // Обработчики событий
            sendButton.addEventListener('click', function() {
                if (controller) {
                    // Если запрос уже идет, останавливаем его
                    controller.abort();
                    controller = null;
                    
                    // Отмечаем, что печатание отменено
                    typingCancelled = true;
                    
                    // Останавливаем таймер печатания, если он активен
                    if (typingTimerId) {
                        if (typeof typingTimerId === 'number') {
                            cancelAnimationFrame(typingTimerId);
                        } else {
                            clearInterval(typingTimerId);
                        }
                        typingTimerId = null;
                    }
                    
                    // Скрываем индикатор загрузки
                    toggleLoadingState(false);
                } else {
                    // Иначе отправляем новое сообщение
                    sendMessage();
                }
            });
            
            messageInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    sendMessage();
                }
            });
            
            desktopNewChat.addEventListener('click', createNewChat);
            mobileNewChat.addEventListener('click', createNewChat);
            
            mobileHistoryBtn.addEventListener('click', openMobileHistory);
            mobileHistoryClose.addEventListener('click', closeMobileHistory);
            overlay.addEventListener('click', closeMobileHistory);
            
            // Открытие модального окна профиля
            const profileModal = document.getElementById('profile-modal');
            const sidebarUser = document.getElementById('sidebar-user');
            const mobileSidebarUser = document.getElementById('mobile-sidebar-user');
            const closeModalButtons = document.querySelectorAll('.close-modal');
            const privacyPolicyLink = document.getElementById('privacy-policy-link');
            const logoutLink = document.getElementById('logout-link');
            
            function openProfileModal() {
                profileModal.style.display = 'block';
                setTimeout(() => {
                    profileModal.classList.add('active');
                }, 10);
            }
            
            function closeProfileModal() {
                profileModal.classList.remove('active');
                setTimeout(() => {
                    profileModal.style.display = 'none';
                }, 300);
            }
            
            sidebarUser.addEventListener('click', openProfileModal);
            mobileSidebarUser.addEventListener('click', openProfileModal);
            
            closeModalButtons.forEach(button => {
                button.addEventListener('click', closeProfileModal);
            });
            
            // Закрытие модального окна при клике вне его области
            window.addEventListener('click', function(event) {
                if (event.target === profileModal) {
                    closeProfileModal();
                }
            });
            
            // Обработчик для перехода на страницу о проекте
            const aboutProjectLink = document.getElementById('about-project-link');
            aboutProjectLink.addEventListener('click', function() {
                window.location.href = '/about';
            });
            
            // Обработчик для перехода на страницу политики конфиденциальности
            privacyPolicyLink.addEventListener('click', function() {
                window.location.href = '/privacy';
            });
            
            // Обработчик для выхода из аккаунта
            logoutLink.addEventListener('click', async function() {
                try {
                    await window.supabaseClient.auth.signOut();
                    window.location.href = '/auth';
                } catch (error) {
                    console.error('Ошибка при выходе из аккаунта:', error);
                    showError('Не удалось выйти из аккаунта');
                }
            });
            
            // Обработчики для переключения языка
            languageOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const lang = this.dataset.lang;
                    
                    // Обновляем активный класс
                    languageOptions.forEach(opt => {
                        opt.classList.toggle('active', opt.dataset.lang === lang);
                    });
                    
                    // Изменяем язык через модуль i18n
                    window.i18nModule.changeLanguage(lang);
                    
                    // Обновляем тексты на странице
                    window.i18nModule.updatePageTexts();
                });
            });
            
            // Устанавливаем активный класс для текущего языка
            const currentLang = localStorage.getItem('app_language') || 'ru';
            languageOptions.forEach(option => {
                option.classList.toggle('active', option.dataset.lang === currentLang);
            });
            
            // Загружаем историю при загрузке страницы
            loadHistory();
        });
    </script>
</body>
</html>
